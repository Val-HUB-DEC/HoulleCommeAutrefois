<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fête de la Moisson</title>

    <!-- Bootstrap local -->
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <script src="bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Ton CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>
<body>


    

<!-- 🔹 BARRE 1 -->
<div class="topbar-association">
    <div class="container position-relative d-flex align-items-center justify-content-center">

        <!-- ☰ Bouton menu à gauche -->
        <button class="btn text-white position-absolute start-0"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#menuLateral">
            ☰
        </button>

        <!-- Logo + texte centré -->
        <a class="navbar-brand d-flex align-items-center justify-content-center text-center m-0" href="#">
            <img src="images/logo.png" class="logo-association me-2">
            <strong>Houlle Comme Autrefois</strong>
        </a>

    </div>
</div>

<!-- 🔹 Menu Déroulant -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="menuLateral">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
        <ul class="list-group">
            <a href="index.html" class="list-group-item">🏠 Accueil</a>
            <a href="outil.html" class="list-group-item">🚜 Outils agricoles</a>
            <a href="marche.html" class="list-group-item">🥬 Marché du terroir</a>
            <a href="restauration.html" class="list-group-item">🍻 Restauration / Buvette</a>
        </ul>
    </div>
</div>

<!-- 🔹 BARRE 2 -->
<div class="topbar-page">
    <div class="container text-center text-white">
        Accueil
    </div>
</div>


<!-- 🔵 CONTENU PRINCIPAL -->
<div class="container my-2">

    <!--<h2 class="text-center mb-4">Les outils de la moisson</h2>-->
    <!-- 🔸 Notification Date de la fête -->
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
        Venez à notre traditionnelle <strong>Fête de la moisson le 23 aout à Houlle</strong>!!!
        <img src="images/affiche.png" class="affiche-img" alt="affiche">
        <button type="button" class="btn btn-outline-primary"onclick="addToCalendar()">Ajouter au calendrier</button>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-4">

        <!-- 🔸 OUTIL -->
        <div class="col-12 col-md-6 col-lg-4">
            <a href="outil.html" class="text-decoration-none text-dark">
                <div class="card shadow h-100 tool-card">
                    <img src="images/outil.png" class="card-img-top" alt="outil">
                    <div class="card-body">
                        <h5 class="card-title">🚜 Outils agricoles</h5>
                    </div>
                </div>
            </a>
        </div>

        <!-- 🔸 Marché Du terroir -->
        <div class="col-12 col-md-6 col-lg-4">
            <a href="marche.html" class="text-decoration-none text-dark">
                <div class="card shadow h-100 tool-card">
                    <img src="images/marche.png" class="card-img-top" alt="marche">
                    <div class="card-body">
                        <h5 class="card-title">🥬 Marché du terroir</h5>
                    </div>
                </div>
            </a>
        </div>

        <!-- 🔸 Restauration / Buvette -->
        <div class="col-12 col-md-6 col-lg-4">
            <a href="restauration.html" class="text-decoration-none text-dark">
                <div class="card shadow h-100 tool-card">
                    <img src="images/restauration.png" class="card-img-top" alt="restauration">
                    <div class="card-body">
                        <h5 class="card-title">🍻 Restauration / Buvette</h5>
                    </div>
                </div>
            </a>
        </div>

        
    </div>
</div>
